name: Backfill Illustrators

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install
        working-directory: sync

      - name: Run backfill
        working-directory: sync
        env:
          SUPABASE_URL: https://hbpjbefohkcnovlwvqhc.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node backfill-illustrators.mjs
