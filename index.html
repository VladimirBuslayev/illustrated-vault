  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{min-height:100%;}
    body{background:#07070f;color:#e8e8f4;font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-text-size-adjust:100%;overscroll-behavior:none;}
    .font-display{font-family:'Fraunces',Georgia,serif;font-optical-sizing:auto;}
    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#07070f;} ::-webkit-scrollbar-thumb{background:#2a2a45;border-radius:3px;}
    .card-tile{position:relative;cursor:pointer;border-radius:6px;overflow:hidden;}
    .card-tile img{display:block;width:100%;height:auto;border-radius:6px;transition:transform .15s ease,filter .15s ease;background:#1a1a2e;}
    .card-tile.missing img{filter:grayscale(1) brightness(0.3);}
    .color-mode .card-tile.missing img{filter:none;}
    .card-tile.owned   img{filter:none;}
    .card-tile:hover   img{transform:translateY(-2px) scale(1.03);}
    .card-tile.missing:hover img{filter:grayscale(0.5) brightness(0.5);}
    .color-mode .card-tile.missing:hover img{filter:none;}
    .card-blank{width:100%;padding-bottom:139.7%;border-radius:6px;position:relative;border:1px solid #1e1e35;background:repeating-linear-gradient(135deg,#13131f,#13131f 8px,#171728 8px,#171728 16px);}
    .card-blank .blank-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:6px;color:#46466a;}
    .card-blank .blank-inner span{font-size:.58rem;color:#5a5a82;text-align:center;line-height:1.3;}
    .fav-btn{position:absolute;bottom:3px;right:3px;width:17px;height:17px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;transition:transform .1s,background .1s;}
    .fav-btn:hover{transform:scale(1.2);}
    .fav-btn.on {background:rgba(255,200,30,0.95);color:#1a0f00;}
    .fav-btn.off{background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.45);}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes flameFlicker{0%,100%{transform:scaleX(1) scaleY(1) skewX(0deg);}15%{transform:scaleX(.93) scaleY(1.07) skewX(2deg);}30%{transform:scaleX(1.06) scaleY(.96) skewX(-1deg);}50%{transform:scaleX(.97) scaleY(1.05) skewX(1.5deg);}70%{transform:scaleX(1.04) scaleY(.98) skewX(-2deg);}85%{transform:scaleX(.95) scaleY(1.03) skewX(1deg);}}
    @keyframes flameFlicker2{0%,100%{transform:scaleX(1) scaleY(1);}25%{transform:scaleX(1.08) scaleY(.94);}50%{transform:scaleX(.92) scaleY(1.08);}75%{transform:scaleX(1.05) scaleY(.97);}}
    @keyframes emberRise{0%{transform:translateY(0) scale(1);opacity:.9;}80%{opacity:.4;}100%{transform:translateY(-280px) scale(.1);opacity:0;}}
    @keyframes glowPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
    @keyframes cosmicBreathe{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:.95;transform:scale(1.06);}}
    @keyframes landingExit{from{opacity:1;transform:scale(1);}to{opacity:0;transform:scale(1.04);}}
    .spinner{animation:spin .8s linear infinite;}
    .fade-up{animation:fadeUp .2s ease forwards;}
    .fade-in{animation:fadeIn .5s ease forwards;}
    .prog-fill{transition:width .7s ease;}
    .modal-bg{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
    .landing-exit{animation:landingExit .45s ease forwards;}
    input:focus,select:focus{outline:none;border-color:#8b6cd8!important;}
    select{-webkit-appearance:none;appearance:none;cursor:pointer;}
    input[type="search"]::-webkit-search-cancel-button{display:none;}
    .artist-row{border-radius:10px;transition:background .15s;cursor:pointer;}
    .artist-row:hover{background:rgba(255,255,255,0.03);}
    .wanted-row{border-radius:10px;transition:background .15s;}
    .wanted-row:hover{background:rgba(255,255,255,0.03);}
    @keyframes popIn{from{opacity:0;transform:scale(.96) translateY(-4px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .fact-panel{animation:popIn .22s cubic-bezier(.2,.9,.3,1.3) forwards;transform-origin:top left;}
    .btn-flame{background:linear-gradient(135deg,#ff5500,#ff8800);color:#fff;border:none;cursor:pointer;transition:transform .12s ease,box-shadow .15s ease,filter .15s ease;}
    .btn-flame:hover{filter:brightness(1.08);box-shadow:0 6px 20px rgba(255,85,0,0.3);}
    .btn-flame:active{transform:scale(.96);}
    .btn-moon{background:linear-gradient(135deg,#7c5cd6,#c0589e);color:#fff;border:none;cursor:pointer;transition:transform .12s ease,box-shadow .15s ease,filter .15s ease;}
    .btn-moon:hover{filter:brightness(1.1);box-shadow:0 6px 20px rgba(139,108,216,0.3);}
    .btn-moon:active{transform:scale(.96);}
    .btn-ghost{background:#141425;color:#e8e8f4;border:1px solid #1e1e35;cursor:pointer;transition:transform .12s ease,background .15s ease,border-color .15s ease;}
    .btn-ghost:hover{background:#1a1a30;border-color:#2a2a45;}
    .btn-ghost:active{transform:scale(.96);}
    .info-btn{background:none;border:none;cursor:pointer;color:#52527a;display:flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;transition:background .15s ease,color .15s ease,transform .1s ease;flex-shrink:0;}
    .info-btn:hover{background:rgba(192,88,158,0.14);color:#d68fc0;}
    .info-btn:active{transform:scale(.85);}
    .info-btn.active{color:#d68fc0;background:rgba(192,88,158,0.14);}
    .btn-tap{transition:transform .12s ease,filter .15s ease;}
    .btn-tap:hover{filter:brightness(1.15);}
    .btn-tap:active{transform:scale(.96);}

const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch{}};

const toSlug  =s=>s.toLowerCase().replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
const normName=s=>(s||"").toLowerCase().trim().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ");
const normNum =n=>(n||"").toString().toLowerCase().trim().replace(/\/.*$/,"").trim();
const normSet =s=>(s||"").toLowerCase().replace(/&/g,"and").replace(/[—–]/g," ").replace(/[^a-z0-9\s]/g,"").replace(/\bpromos?\b/g,"promo").replace(/\s+/g," ").trim();
const fmt$    =n=>(n!=null&&!isNaN(n))?`$${Number(n).toFixed(2)}`:"—";
const todayStr=()=>new Date().toISOString().slice(0,10);

const makeKeys=(cn,num,sn)=>{const n=normName(cn);if(!n)return[];const k=[];const nu=normNum(num);if(nu)k.push(n+"::num::"+nu);const s=normSet(sn);if(s)k.push(n+"::set::"+s);return k;};
const isCardOwned=(card,ownedKeySet,mo,mm)=>{if(mm.has(card.id))return false;if(mo.has(card.id))return true;return makeKeys(card.name||"",card.localId||"",card.set&&card.set.name||"").some(k=>ownedKeySet.has(k));};

const imgSmall=card=>card&&card.image?`${card.image}/low.webp`:null;
// TCG Pocket is the virtual-only mobile app, distinct from the physical TCG —
// its card assets all route through an asset path containing "/tcgp/".
const isTcgPocketCard=card=>!!(card&&card.image&&card.image.includes("/tcgp/"));
const imgLarge=card=>card&&card.image?`${card.image}/high.webp`:null;

// ── Pricing — TCGdex stores TCGPlayer data under pricing.tcgplayer.{variant}.marketPrice ──
const PRICE_VARIANT_ORDER=["holofoil","reverse-holofoil","normal","1st-edition-holofoil","1st-edition","unlimited-holofoil","unlimited"];
const getBestPrice=card=>{
  const p=card&&card.pricing&&card.pricing.tcgplayer;
  if(!p)return null;
  for(const k of PRICE_VARIANT_ORDER){
    if(p[k]&&p[k].marketPrice!=null)return{amount:p[k].marketPrice,variant:k,prices:{low:p[k].lowPrice,mid:p[k].midPrice,high:p[k].highPrice}};
  }
  const keys=Object.keys(p).filter(k=>k!=="updated"&&k!=="unit");
  const first=keys[0];
  if(first&&p[first]&&p[first].marketPrice!=null)return{amount:p[first].marketPrice,variant:first,prices:{low:p[first].lowPrice,mid:p[first].midPrice,high:p[first].highPrice}};
  return null;
};

const sortCards=(arr,sortBy,checkOwned)=>{
  if(!arr||!arr.length)return arr;const a2=arr.slice();
  const priceOf=c=>{const p=getBestPrice(c);return p?p.amount:null;};
  const byName=(a,b)=>(a.name||"").localeCompare(b.name||"");
  const byDate=(a,b)=>{const da=a.set&&a.set.releaseDate||"",db=b.set&&b.set.releaseDate||"";return da===db?byName(a,b):da.localeCompare(db);};
  switch(sortBy){
    case"price-desc":return a2.sort((a,b)=>{const pa=priceOf(a),pb=priceOf(b);if(pa===null&&pb===null)return byName(a,b);if(pa===null)return 1;if(pb===null)return-1;return pb-pa||byName(a,b);});
    case"price-asc": return a2.sort((a,b)=>{const pa=priceOf(a),pb=priceOf(b);if(pa===null&&pb===null)return byName(a,b);if(pa===null)return 1;if(pb===null)return-1;return pa-pb||byName(a,b);});
    case"missing":   return a2.sort((a,b)=>{const ao=checkOwned(a),bo=checkOwned(b);return ao!==bo?(ao?1:-1):byName(a,b);});
    case"owned":     return a2.sort((a,b)=>{const ao=checkOwned(a),bo=checkOwned(b);return ao!==bo?(ao?-1:1):byName(a,b);});
    case"date-desc": return a2.sort((a,b)=>byDate(b,a));
    case"date-asc":  return a2.sort(byDate);
    default:return a2;
  }
};

// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function loadUserData(userId){
  const[colRes,ovRes,phRes,favRes]=await Promise.all([
    sb.from("user_collection").select("owned_keys").eq("user_id",userId).maybeSingle(),
    sb.from("card_overrides").select("card_id,override_type").eq("user_id",userId),
    sb.from("price_history").select("card_id,price,recorded_date").eq("user_id",userId).order("recorded_date"),
    sb.from("card_favorites").select("card_id").eq("user_id",userId),
  ]);
  const ownedKeys=new Set(colRes.data?.owned_keys??[]);
  const manualOwned=new Set(),manualMissing=new Set();
  (ovRes.data??[]).forEach(r=>r.override_type==="owned"?manualOwned.add(r.card_id):manualMissing.add(r.card_id));
  const priceHistory={};
  (phRes.data??[]).forEach(r=>{if(!priceHistory[r.card_id])priceHistory[r.card_id]=[];priceHistory[r.card_id].push({date:r.recorded_date,price:Number(r.price)});});
  const favorites=new Set((favRes.data??[]).map(r=>r.card_id));
  return{ownedKeys,manualOwned,manualMissing,priceHistory,favorites};
}
async function saveCollection(uid,keys){return sb.from("user_collection").upsert({user_id:uid,owned_keys:Array.from(keys),updated_at:new Date().toISOString()},{onConflict:"user_id"});}
async function saveOverride(uid,cardId,action){if(action==="reset")return sb.from("card_overrides").delete().eq("user_id",uid).eq("card_id",cardId);return sb.from("card_overrides").upsert({user_id:uid,card_id:cardId,override_type:action},{onConflict:"user_id,card_id"});}
async function savePricePoint(uid,cardId,price,date){return sb.from("price_history").upsert({user_id:uid,card_id:cardId,price,recorded_date:date},{onConflict:"user_id,card_id,recorded_date"});}
async function fetchSharedCollection(token){
  const{data,error}=await sb.rpc("get_shared_collection",{p_token:token});
  if(error||!data)return null;
  return data;
}

// ── TCGdex API ─────────────────────────────────────────────────────────────────
async function fetchCardBriefs(entry){
  if(entry.isSet){
    const res=await fetch(`${TCG_BASE}/sets/${entry.setId}`);
    if(!res.ok)throw new Error(`Set "${entry.setId}" error ${res.status}`);
    const json=await res.json();
    return json.cards||[];
  }
  const res=await fetch(`${TCG_BASE}/illustrators/${encodeURIComponent(entry.name)}`);
  if(!res.ok)throw new Error(`Illustrator lookup error ${res.status}`);
  const json=await res.json();
  // TCGdex wraps this response as {name, cards:[...]} rather than a bare
  // array — the old `Array.isArray(json)?json:[]` check silently discarded
  // every real result here, which is why every artist always came back empty
  // with no error: the fetch succeeded, the parsing just threw the data away.
  if(Array.isArray(json))return json;
  if(json&&Array.isArray(json.cards))return json.cards;
  return [];
}
async function fetchFullCard(id){
  const res=await fetch(`${TCG_BASE}/cards/${id}`);
  if(!res.ok)return null;
  return res.json();
}

// ── Fallback images for cards TCGdex has no asset for ─────────────────────────
// pokemontcg.io's archive of pre-2022 sets (especially the old promo/e-card
// series, where most of these gaps occur) uses the exact same {setId}-{number}
// ID convention TCGdex does — confirmed directly in their own migration docs —
// so a direct ID lookup is far more reliable here than fuzzy name search.
const PTCGIO_BASE="https://api.pokemontcg.io/v2";
async function fetchFallbackImage(cardId){
  const ck=`pb_fallback_img_${cardId}`;
  const cached=lsGet(ck);
  if(cached!==null)return cached; // {small,large} on a known hit, false on a known miss
  try{
    const res=await fetch(`${PTCGIO_BASE}/cards/${encodeURIComponent(cardId)}`);
    if(!res.ok){lsSet(ck,false);return false;}
    const json=await res.json();
    const imgs=json&&json.data&&json.data.images;
    if(imgs&&(imgs.small||imgs.large)){
      const result={small:imgs.small||null,large:imgs.large||null};
      lsSet(ck,result);
      return result;
    }
    lsSet(ck,false);
    return false;
  }catch{
    return false; // don't cache transient network errors — allow a retry later
  }
}
// Tier 2: Limitless TCG, the competitive scene's standard database — usually
// the fastest place to get images for brand-new sets, well before TCGdex or
// pokemontcg.io catch up. There's no JSON endpoint to query, so this is a
// *constructed* URL guess from the set code + card number, not a verified
// lookup — callers must confirm it actually loads (e.g. via <img onError>)
// before trusting it, since an incorrect set-code-casing or numbering
// convention for some set would otherwise silently show nothing useful.
function buildLimitlessGuess(card){
  const setId=card&&card.set&&card.set.id;
  const num=card&&card.localId;
  if(!setId||!num)return null;
  const code=String(setId).toUpperCase();
  const base=`https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpci/${code}/${code}_${num}_R_EN`;
  return{small:`${base}_SM.png`,large:`${base}_LG.png`};
}
async function fetchArtistCards(entry){
  const ck=`pb6_cards_${toSlug(entry.name)}`;
  const cached=lsGet(ck);
  if(cached&&cached.ts&&Date.now()-cached.ts<CACHE_TTL)return cached.cards;
  const rawBriefs=await fetchCardBriefs(entry);
  // TCGdex's illustrator endpoint can list the same card id more than once
  // (e.g. a card cross-linked under multiple printings) — dedupe up front so
  // we don't waste a detail fetch on it twice or show it twice in the grid.
  const seen=new Set();
  const briefs=rawBriefs.filter(b=>{
    if(!b||!b.id||seen.has(b.id))return false;
    seen.add(b.id);
    return true;
  });
  const fullCards=[];
  let failCount=0;
  for(let i=0;i<briefs.length;i+=FETCH_BATCH){
    const batch=briefs.slice(i,i+FETCH_BATCH);
    const results=await Promise.all(batch.map(b=>fetchFullCard(b.id).catch(()=>null)));
    results.forEach(c=>{if(c)fullCards.push(c);else failCount++;});
  }
  // If TCGdex told us cards exist but every single detail fetch failed (e.g. a
  // burst of requests got throttled), don't cache that as a real "0 cards"
  // result for 24h — surface it as a retryable error instead.
  if(briefs.length>0&&fullCards.length===0){
    throw new Error(`Found ${briefs.length} cards but all detail fetches failed — likely rate-limited`);
  }
  // A *partial* failure is just as unsafe to cache: a few throttled requests
  // would otherwise get silently baked in as "this artist only has N cards"
  // for a full 24h, hiding real cards from the binder with no visible error.
  if(failCount>0){
    throw new Error(`${failCount} of ${briefs.length} card detail fetches failed — likely rate-limited, retry shortly`);
  }
  fullCards.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  lsSet(ck,{cards:fullCards,ts:Date.now()});
  return fullCards;
}

// ── FLAME BACKGROUND ──────────────────────────────────────────────────────────
const FDEFS=[
  {left:"8%", w:70, h:260,blur:14,delay:0,  dur:2.1,anim:"flameFlicker"},
  {left:"18%",w:45, h:180,blur:10,delay:.4, dur:1.7,anim:"flameFlicker2"},
  {left:"30%",w:90, h:310,blur:18,delay:.15,dur:2.4,anim:"flameFlicker"},
  {left:"42%",w:55, h:220,blur:12,delay:.7, dur:1.9,anim:"flameFlicker2"},
  {left:"54%",w:100,h:340,blur:20,delay:.05,dur:2.2,anim:"flameFlicker"},
  {left:"66%",w:60, h:200,blur:11,delay:.55,dur:1.8,anim:"flameFlicker2"},
  {left:"78%",w:80, h:280,blur:16,delay:.3, dur:2.0,anim:"flameFlicker"},
  {left:"90%",w:50, h:170,blur:9, delay:.65,dur:1.6,anim:"flameFlicker2"},
];
const EDEFS=Array.from({length:22},(_,i)=>({left:(5+i*4.2+Math.sin(i*1.3)*8)%95+"%",size:3+(i%4),delay:(i*.37)%4,dur:2.2+(i%3)*.8}));
function FlameBackground({dim}){
  const op=dim?.5:1;
  return(<>
    <div style={{position:"absolute",bottom:0,left:0,right:0,height:"65%",overflow:"hidden",opacity:op}}>
      {FDEFS.map((f,i)=><div key={i} style={{position:"absolute",bottom:0,left:f.left,marginLeft:-f.w/2,width:f.w,height:f.h,background:"linear-gradient(to top,#ff2200 0%,#ff6600 40%,#ffaa00 70%,#ffe066 90%,transparent 100%)",borderRadius:"50% 50% 25% 25% / 55% 55% 45% 45%",filter:`blur(${f.blur}px)`,transformOrigin:"bottom center",animation:`${f.anim} ${f.dur}s ${f.delay}s ease-in-out infinite`,opacity:.88}}/>)}
    </div>
    <div style={{position:"absolute",inset:0,overflow:"hidden",pointerEvents:"none",opacity:op}}>
      {EDEFS.map((e,i)=><div key={i} style={{position:"absolute",bottom:"15%",left:e.left,width:e.size,height:e.size,borderRadius:"50%",background:"#ff9900",boxShadow:`0 0 ${e.size*2}px #ff4400`,animation:`emberRise ${e.dur}s ${e.delay}s ease-out infinite`,opacity:0}}/>)}
    </div>
    <div style={{position:"absolute",bottom:0,left:0,right:0,height:120,background:"linear-gradient(to top,rgba(255,60,0,0.35),transparent)",animation:"glowPulse 2.5s ease-in-out infinite",opacity:op}}/>
  </>);
}

// ── LANDING / AUTH ────────────────────────────────────────────────────────────
function LandingPage({user,onEnter,onSendLink,onVerifyCode,onSignOut}){
  const[email,setEmail]=useState("");
  const[linkSent,setLinkSent]=useState(false);
  const[sending,setSending]=useState(false);
  const[error,setError]=useState("");
  const[exiting,setExiting]=useState(false);
  const[code,setCode]=useState("");
  const[verifying,setVerifying]=useState(false);
  const[codeError,setCodeError]=useState("");
  const isLoggedIn=!!user;
  const enter=()=>{setExiting(true);setTimeout(onEnter,420);};
  useEffect(()=>{const fn=e=>{if(e.key==="Enter"&&isLoggedIn)enter();};window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);},[isLoggedIn]);
  const send=async()=>{if(!email.trim())return;setSending(true);setError("");try{await onSendLink(email.trim());setLinkSent(true);}catch(err){setError(err.message||"Failed to send.");}finally{setSending(false);}};
  const verify=async()=>{if(!code.trim())return;setVerifying(true);setCodeError("");try{await onVerifyCode(email.trim(),code.trim());}catch(err){setCodeError(err.message||"That code didn't work.");}finally{setVerifying(false);}};
  const cardStyle={background:"rgba(7,7,15,0.78)",border:"1px solid rgba(255,100,0,0.18)",borderRadius:16,padding:"1.75rem",maxWidth:360,width:"100%",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)"};
  const inputStyle={width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,100,0,0.3)",borderRadius:10,color:"#fff8f0",padding:".65rem 1rem",fontSize:"1rem",marginBottom:".75rem",outline:"none"};
  return(
    <div className={exiting?"landing-exit":""} onClick={isLoggedIn?enter:undefined}
      style={{position:"fixed",inset:0,zIndex:9999,cursor:isLoggedIn?"pointer":"default",background:"radial-gradient(ellipse at 50% 110%,#3d0f00 0%,#1a0500 40%,#080200 70%,#030100 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
      <FlameBackground/>
      <div className="fade-in" style={{position:"relative",zIndex:10,textAlign:"center",padding:"1rem",width:"100%",maxWidth:400}}>
        <div style={{position:"relative",display:"flex",justifyContent:"center",marginBottom:"1.25rem"}}>
          <div style={{position:"absolute",width:200,height:200,borderRadius:"50%",background:"radial-gradient(circle,rgba(198,87,143,0.5) 0%,rgba(21,3,83,0.35) 55%,transparent 75%)",filter:"blur(18px)",animation:"cosmicBreathe 4.5s ease-in-out infinite",pointerEvents:"none"}}/>
          <BlazLogo size={80} glow/>
        </div>
        <h1 className="font-display" style={{position:"relative",fontSize:"clamp(2.4rem,9vw,4.2rem)",fontWeight:700,letterSpacing:"-.02em",lineHeight:1,marginBottom:".7rem",backgroundImage:"linear-gradient(90deg,#fcd99d 0%,#f38e29 22%,#ea2515 45%,#c6578f 70%,#150353 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",filter:"drop-shadow(0 0 28px rgba(234,37,21,0.45))"}}>
          Illustrated
        </h1>
        {isLoggedIn?(
          <>
            <p style={{fontSize:".78rem",color:"#5a2a10",fontStyle:"italic",marginBottom:"2.25rem",letterSpacing:".04em"}}>The art is the point.</p>
            <button onClick={e=>{e.stopPropagation();enter();}} style={{background:"linear-gradient(135deg,#ff5500,#ff2200)",color:"#fff8f0",border:"none",borderRadius:50,padding:".9rem 3rem",fontSize:"1rem",fontWeight:800,cursor:"pointer",letterSpacing:".1em",boxShadow:"0 0 40px rgba(255,60,0,0.6),0 0 80px rgba(255,60,0,0.3)"}}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.06)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              ENTER BINDER
            </button>
            <div style={{marginTop:"1.5rem",display:"flex",alignItems:"center",justifyContent:"center",gap:".75rem"}}>
              <span style={{fontSize:".68rem",color:"#4a2010"}}>{user.email}</span>
              <button onClick={e=>{e.stopPropagation();onSignOut();}} style={{fontSize:".68rem",color:"#ff6633",background:"none",border:"1px solid rgba(255,100,50,0.2)",borderRadius:6,padding:"2px 8px",cursor:"pointer"}}>Sign out</button>
            </div>
          </>
        ):linkSent?(
          <div onClick={e=>e.stopPropagation()} style={{...cardStyle,marginTop:"1rem"}}>
