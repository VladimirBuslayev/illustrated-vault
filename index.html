<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07070f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Artist Binder</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#07070f', surface: '#0f0f1c', card: '#141425',
            border: '#1e1e35', accent: '#8b6cd8', text: '#e8e8f4',
            muted: '#6b6b90', ok: '#22c55e', err: '#f87171',
          }
        }
      }
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { min-height: 100%; }
    body {
      background: #07070f; color: #e8e8f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-text-size-adjust: 100%; overscroll-behavior: none;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #07070f; }
    ::-webkit-scrollbar-thumb { background: #2a2a45; border-radius: 3px; }

    .card-tile { position: relative; cursor: pointer; border-radius: 6px; overflow: hidden; }
    .card-tile img {
      display: block; width: 100%; height: auto; border-radius: 6px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .card-tile.missing img { filter: grayscale(1) brightness(0.3); }
    .card-tile.owned   img { filter: none; }
    .card-tile:hover   img { transform: translateY(-2px) scale(1.03); }
    .card-tile.missing:hover img { filter: grayscale(0.5) brightness(0.5); }

    .card-blank {
      width: 100%; padding-bottom: 139.7%;
      background: #141425; border-radius: 6px;
      position: relative; border: 1px solid #1e1e35;
    }
    .card-blank span {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 5px; font-size: 0.58rem; color: #4a4a70;
      text-align: center; line-height: 1.3;
    }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .spinner  { animation: spin 0.8s linear infinite; }
    .fade-up  { animation: fadeUp 0.2s ease forwards; }
    .prog-fill { transition: width 0.7s ease; }
    .modal-bg { backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
    input:focus, select:focus { outline: none; border-color: #8b6cd8 !important; }
    select { -webkit-appearance: none; appearance: none; cursor: pointer; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }
  </style>
</head>
<body>
  <div id="splash" style="
    position:fixed; inset:0; background:#07070f; z-index:9999;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:0.75rem; transition:opacity 0.3s;
  ">
    <div style="font-size:2.5rem">🎴</div>
    <div style="font-size:0.825rem; color:#6b6b90">Loading binder…</div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    /** @jsxRuntime classic */

    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ════════════════════════════════════════════════════════════
    // CONFIG
    // ════════════════════════════════════════════════════════════
    const API_BASE  = "https://api.pokemontcg.io/v2";
    const CACHE_TTL = 24 * 60 * 60 * 1000;

    const ARTISTS = [
      { name: "Yuka Morii",       tier: "main",      isSet: false },
      { name: "Asoka Ito",        tier: "main",      isSet: false },
      { name: "Tomokazu Komiya",  tier: "main",      isSet: false },
      { name: "Shinji Kanda",     tier: "main",      isSet: false },
      { name: "Atsuko Nishida",   tier: "main",      isSet: false },
      { name: "Sowsow",           tier: "main",      isSet: false },
      { name: "Shibuzoh",         tier: "main",      isSet: false },
      { name: "Yukiko Baba",      tier: "main",      isSet: false },
      { name: "sui",              tier: "main",      isSet: false },
      { name: "akira egawa",      tier: "secondary", isSet: false },
      { name: "saitou",           tier: "secondary", isSet: false },
      { name: "tsuruta",          tier: "secondary", isSet: false },
      { name: "okachege",         tier: "secondary", isSet: false },
      { name: "0313",             tier: "secondary", isSet: false },
      { name: "gossan",           tier: "secondary", isSet: false },
      { name: "mizue",            tier: "secondary", isSet: false },
      { name: "kayama",           tier: "secondary", isSet: false },
      { name: "gapao",            tier: "secondary", isSet: false },
      { name: "okubo",            tier: "secondary", isSet: false },
      { name: "fukuda",           tier: "secondary", isSet: false },
      { name: "Pokémon GO",       tier: "special",   isSet: true,  query: "set.id:pgo" },
    ];

    // ════════════════════════════════════════════════════════════
    // STORAGE
    // ════════════════════════════════════════════════════════════
    const lsGet = k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } };
    const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
    const lsDel = k => { try { localStorage.removeItem(k); } catch {} };

    // ════════════════════════════════════════════════════════════
    // HELPERS
    // ════════════════════════════════════════════════════════════
    const toSlug   = s => s.toLowerCase().replace(/[^a-z0-9]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
    const normName = s => (s || "").toLowerCase().trim().replace(/[^a-z0-9\s]/g, "").replace(/\s+/g, " ");

    // Normalise set names so Collectr and pokemontcg.io names match
    // e.g. "Scarlet & Violet" == "Scarlet and Violet", "Promos" == "Promo"
    const normSet = s => (s || "")
      .toLowerCase()
      .replace(/&/g, "and")
      .replace(/[^a-z0-9\s]/g, "")
      .replace(/\bpromos\b/g, "promo")
      .replace(/\s+/g, " ")
      .trim();

    // Ownership key: "normName:::normSet"
    // Matching by name + set prevents false positives when different artists
    // have drawn the same Pokémon in different sets.
    const ownedKey = (cardName, setName) => normName(cardName) + ":::" + normSet(setName);

    const fmt$     = n  => (n != null && !isNaN(n)) ? `$${Number(n).toFixed(2)}` : "—";
    const todayStr = () => new Date().toISOString().slice(0, 10);

    const getBestPrice = card => {
      const p = card && card.tcgplayer && card.tcgplayer.prices ? card.tcgplayer.prices : {};
      for (const k of ["holofoil","1stEditionHolofoil","unlimitedHolofoil","reverseHolofoil","normal","unlimited"]) {
        if (p[k] && p[k].market != null) return { amount: p[k].market, variant: k, prices: p[k] };
      }
      const first = Object.keys(p)[0];
      if (first && p[first] && p[first].market != null) return { amount: p[first].market, variant: first, prices: p[first] };
      return null;
    };

    // Sort a card array given the current sortBy mode and owned key set
    const sortCards = function(arr, sortBy, ownedKeys) {
      if (!arr || !arr.length) return arr;
      const a2 = arr.slice();
      const priceOf = function(c) { const p = getBestPrice(c); return p ? p.amount : null; };
      const isOwned = function(c) { return ownedKeys.has(ownedKey(c.name, c.set && c.set.name || "")); };
      const byName  = function(a, b) { return (a.name || "").localeCompare(b.name || ""); };
      const byDate  = function(a, b) {
        const da = a.set && a.set.releaseDate || "";
        const db = b.set && b.set.releaseDate || "";
        return da === db ? byName(a, b) : da.localeCompare(db);
      };

      switch (sortBy) {
        case "price-desc":
          return a2.sort(function(a, b) {
            const pa = priceOf(a), pb = priceOf(b);
            if (pa === null && pb === null) return byName(a, b);
            if (pa === null) return 1;
            if (pb === null) return -1;
            return pb - pa || byName(a, b);
          });
        case "price-asc":
          return a2.sort(function(a, b) {
            const pa = priceOf(a), pb = priceOf(b);
            if (pa === null && pb === null) return byName(a, b);
            if (pa === null) return 1;
            if (pb === null) return -1;
            return pa - pb || byName(a, b);
          });
        case "missing":
          return a2.sort(function(a, b) {
            const ao = isOwned(a), bo = isOwned(b);
            if (ao !== bo) return ao ? 1 : -1;
            return byName(a, b);
          });
        case "owned":
          return a2.sort(function(a, b) {
            const ao = isOwned(a), bo = isOwned(b);
            if (ao !== bo) return ao ? -1 : 1;
            return byName(a, b);
          });
        case "date-desc":
          return a2.sort(function(a, b) { return byDate(b, a); });
        case "date-asc":
          return a2.sort(byDate);
        default: // "name" — API already returns name-sorted
          return a2;
      }
    };

    // ════════════════════════════════════════════════════════════
    // API
    // ════════════════════════════════════════════════════════════
    async function apiFetch(q, apiKey) {
      let all = [], page = 1;
      const headers = apiKey ? { "X-Api-Key": apiKey } : {};
      while (true) {
        const res = await fetch(
          `${API_BASE}/cards?q=${encodeURIComponent(q)}&pageSize=250&page=${page}&orderBy=name`,
          { headers }
        );
        if (!res.ok) throw new Error(`API error ${res.status}`);
        const json = await res.json();
        const data = json.data || [];
        const total = json.totalCount || 0;
        all = all.concat(data);
        if (all.length >= total || !data.length) break;
        page++;
      }
      return all;
    }

    async function fetchArtistCards(entry, apiKey) {
      const ck = `pb2_cards_${toSlug(entry.name)}`;
      const cached = lsGet(ck);
      if (cached && cached.ts && Date.now() - cached.ts < CACHE_TTL) return cached.cards;
      const q = entry.isSet ? entry.query : `artist:"${entry.name}"`;
      const cards = await apiFetch(q, apiKey);
      lsSet(ck, { cards, ts: Date.now() });
      return cards;
    }

    // ════════════════════════════════════════════════════════════
    // ICONS
    // ════════════════════════════════════════════════════════════
    function Ico({ children, size }) {
      return (
        <svg width={size || 16} height={size || 16} viewBox="0 0 24 24"
          fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round">
          {children}
        </svg>
      );
    }
    const IcoSearch = () => <Ico><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></Ico>;
    const IcoUpload = () => <Ico>
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </Ico>;
    const IcoX     = () => <Ico><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Ico>;
    const IcoGear  = () => <Ico>
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M17.66 6.34l-1.41 1.41M6.34 17.66l-1.41 1.41"/>
    </Ico>;
    const IcoCheck = () => <Ico><polyline points="20 6 9 17 4 12"/></Ico>;
    const IcoRetry = () => <Ico><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></Ico>;
    const IcoSpin  = () => (
      <svg className="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
        <path d="M12 2a10 10 0 0 1 0 20A10 10 0 0 1 12 2" strokeOpacity="0.2"/>
        <path d="M12 2a10 10 0 0 1 10 10"/>
      </svg>
    );
    const IcoChev = ({ open }) => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"
        style={{ transform: open ? "rotate(0deg)" : "rotate(-90deg)", transition: "transform 0.2s ease", flexShrink: 0 }}>
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );

    // ════════════════════════════════════════════════════════════
    // CARD TILE
    // ════════════════════════════════════════════════════════════
    const CardTile = React.memo(function CardTile({ card, owned, onClick }) {
      return (
        <div
          className={`card-tile ${owned ? "owned" : "missing"}`}
          onClick={() => onClick(card)}
          title={`${card.name} — ${owned ? "✓ Owned" : "Missing"}`}
        >
          {card.images && card.images.small
            ? <img src={card.images.small} alt={card.name} loading="lazy" decoding="async" />
            : <div className="card-blank"><span>{card.name}</span></div>
          }
          {owned && (
            <div style={{
              position:"absolute", top:3, right:3,
              background:"rgba(34,197,94,0.92)", borderRadius:"50%",
              width:14, height:14, display:"flex", alignItems:"center", justifyContent:"center"
            }}>
              <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          )}
        </div>
      );
    });

    // ════════════════════════════════════════════════════════════
    // PRICE SPARKLINE
    // ════════════════════════════════════════════════════════════
    function PriceChart({ cardId }) {
      const all  = lsGet("pb2_price_history") || {};
      const hist = (all[cardId] || []).slice(-90);

      if (hist.length < 2) {
        return (
          <div style={{ textAlign:"center", color:"#6b6b90", fontSize:"0.75rem", padding:"1.25rem 0", lineHeight:1.6 }}>
            Price history builds over time as you open cards.<br />
            {hist.length === 1 ? "1 point recorded — check back tomorrow!" : "No history yet for this card."}
          </div>
        );
      }

      const prices = hist.map(function(h) { return h.price; });
      const dates  = hist.map(function(h) { return h.date.slice(5); });
      const minP   = Math.min.apply(null, prices);
      const maxP   = Math.max.apply(null, prices);
      const range  = maxP - minP || 1;
      const W=340, H=80, PX=8, PY=12, W2=W-2*PX, H2=H-2*PY;

      const pts = prices.map(function(p, i) {
        return [
          PX + (prices.length > 1 ? (i / (prices.length - 1)) * W2 : W2/2),
          PY + H2 - ((p - minP) / range) * H2
        ];
      });
      const poly  = pts.map(function(pt) { return pt[0]+","+pt[1]; }).join(" ");
      const last  = pts[pts.length - 1];
      const first = pts[0];
      const areaD = ["M "+first[0]+","+(H-PY)]
        .concat(pts.map(function(pt) { return "L "+pt[0]+","+pt[1]; }))
        .concat(["L "+last[0]+","+(H-PY),"Z"]).join(" ");
      const gradId = "g"+cardId.replace(/[^a-z0-9]/gi,"");

      return (
        <svg viewBox={"0 0 "+W+" "+H} style={{ width:"100%", height:"auto", display:"block" }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#8b6cd8" stopOpacity="0.25"/>
              <stop offset="100%" stopColor="#8b6cd8" stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          <line x1={PX} y1={PY} x2={W-PX} y2={PY} stroke="#1e1e35" strokeWidth="1"/>
          <line x1={PX} y1={PY+H2/2} x2={W-PX} y2={PY+H2/2} stroke="#1e1e35" strokeWidth="1"/>
          <line x1={PX} y1={H-PY} x2={W-PX} y2={H-PY} stroke="#1e1e35" strokeWidth="1"/>
          <path d={areaD} fill={"url(#"+gradId+")"}/>
          <polyline points={poly} fill="none" stroke="#8b6cd8" strokeWidth="2" strokeLinejoin="round"/>
          <circle cx={last[0]} cy={last[1]} r="3" fill="#8b6cd8"/>
          <text x={W-PX} y={PY-2} textAnchor="end" fontSize="8" fill="#6b6b90">{fmt$(maxP)}</text>
          <text x={W-PX} y={H-1} textAnchor="end" fontSize="8" fill="#6b6b90">{fmt$(minP)}</text>
          <text x={PX} y={H-1} fontSize="8" fill="#6b6b90">{dates[0]}</text>
          <text x={W/2} y={H-1} textAnchor="middle" fontSize="8" fill="#6b6b90">{dates[Math.floor(dates.length/2)]}</text>
        </svg>
      );
    }

    // ════════════════════════════════════════════════════════════
    // CARD MODAL
    // ════════════════════════════════════════════════════════════
    function CardModal({ card, owned, onClose }) {
      const price       = getBestPrice(card);
      const allVariants = (card && card.tcgplayer && card.tcgplayer.prices) ? card.tcgplayer.prices : {};

      useEffect(function() {
        if (!card || !price) return;
        const all  = lsGet("pb2_price_history") || {};
        const hist = all[card.id] || [];
        const td   = todayStr();
        if (!hist.find(function(h) { return h.date === td; })) {
          all[card.id] = hist.concat([{ date: td, price: price.amount }]).slice(-180);
          lsSet("pb2_price_history", all);
        }
      }, [card && card.id]);

      useEffect(function() {
        const fn = function(e) { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", fn);
        return function() { window.removeEventListener("keydown", fn); };
      }, [onClose]);

      useEffect(function() {
        document.body.style.overflow = "hidden";
        return function() { document.body.style.overflow = ""; };
      }, []);

      if (!card) return null;

      return (
        <div className="modal-bg" onClick={onClose} style={{
          position:"fixed", inset:0, zIndex:200,
          background:"rgba(7,7,15,0.88)",
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:"1rem",
        }}>
          <div className="fade-up" onClick={function(e) { e.stopPropagation(); }} style={{
            background:"#141425", border:"1px solid #1e1e35", borderRadius:16,
            maxWidth:460, width:"100%", maxHeight:"90dvh", overflowY:"auto",
            padding:"1.25rem",
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"1rem" }}>
              <div>
                <h2 style={{ fontWeight:700, fontSize:"1.05rem", color:"#e8e8f4" }}>{card.name}</h2>
                <div style={{ fontSize:"0.7rem", color:"#6b6b90", marginTop:2 }}>
                  {card.set && card.set.name} · #{card.number} · {card.rarity}
                </div>
              </div>
              <button onClick={onClose} style={{ background:"none", border:"none", color:"#6b6b90", cursor:"pointer", padding:4, display:"flex" }}>
                <IcoX/>
              </button>
            </div>

            <div style={{ display:"flex", gap:"1rem", marginBottom:"1.25rem" }}>
              <div style={{ flexShrink:0, width:128 }}>
                {card.images && card.images.large
                  ? <img src={card.images.large} alt={card.name} style={{ width:"100%", borderRadius:8, filter: owned ? "none" : "grayscale(1) brightness(0.45)" }}/>
                  : <div style={{ width:"100%", paddingBottom:"139%", background:"#0f0f1c", borderRadius:8 }}/>
                }
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ marginBottom:"0.75rem" }}>
                  <span style={{
                    display:"inline-flex", alignItems:"center", gap:4,
                    padding:"2px 8px", borderRadius:4, fontSize:"0.7rem", fontWeight:600,
                    background: owned ? "rgba(34,197,94,0.12)" : "rgba(107,107,144,0.15)",
                    color: owned ? "#22c55e" : "#6b6b90",
                  }}>
                    {owned ? <span style={{display:"flex",alignItems:"center",gap:3}}><IcoCheck/> In Collection</span> : "Missing"}
                  </span>
                </div>
                <div style={{ fontSize:"0.68rem", color:"#6b6b90" }}>Artist</div>
                <div style={{ fontSize:"0.85rem", color:"#e8e8f4", marginBottom:"0.75rem", fontWeight:500 }}>{card.artist}</div>
                {price ? (
                  <div>
                    <div style={{ fontSize:"0.68rem", color:"#6b6b90" }}>Market Price</div>
                    <div style={{ fontSize:"1.5rem", fontWeight:800, color:"#8b6cd8", letterSpacing:"-0.02em", lineHeight:1.1, marginBottom:"0.3rem" }}>
                      {fmt$(price.amount)}
                    </div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", fontSize:"0.68rem" }}>
                      {price.prices && price.prices.low  != null && <span style={{color:"#6b6b90"}}>Low <span style={{color:"#9b9bc0"}}>{fmt$(price.prices.low)}</span></span>}
                      {price.prices && price.prices.mid  != null && <span style={{color:"#6b6b90"}}>Mid <span style={{color:"#9b9bc0"}}>{fmt$(price.prices.mid)}</span></span>}
                      {price.prices && price.prices.high != null && <span style={{color:"#6b6b90"}}>High <span style={{color:"#9b9bc0"}}>{fmt$(price.prices.high)}</span></span>}
                    </div>
                  </div>
                ) : (
                  <div style={{ fontSize:"0.78rem", color:"#6b6b90" }}>No pricing data</div>
                )}
              </div>
            </div>

            {Object.keys(allVariants).length > 1 && (
              <div style={{ marginBottom:"1rem" }}>
                <div style={{ fontSize:"0.68rem", color:"#6b6b90", marginBottom:"0.4rem" }}>All Variants</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"0.4rem" }}>
                  {Object.entries(allVariants).map(function(kv) {
                    const k=kv[0], v=kv[1];
                    if (!v || v.market == null) return null;
                    return (
                      <div key={k} style={{ background:"#0f0f1c", border:"1px solid #1e1e35", borderRadius:6, padding:"3px 8px", fontSize:"0.67rem" }}>
                        <span style={{color:"#6b6b90"}}>{k.replace(/([A-Z])/g," $1").trim()}: </span>
                        <span style={{color:"#e8e8f4", fontWeight:600}}>{fmt$(v.market)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            <div style={{ marginBottom:"0.75rem" }}>
              <div style={{ fontSize:"0.68rem", color:"#6b6b90", marginBottom:"0.4rem" }}>Price History</div>
              <PriceChart cardId={card.id}/>
            </div>

            {card.tcgplayer && card.tcgplayer.url && (
              <a href={card.tcgplayer.url} target="_blank" rel="noopener noreferrer" style={{
                display:"block", textAlign:"center",
                background:"#1a1430", color:"#9b7fe8",
                padding:"0.5rem", borderRadius:8, textDecoration:"none",
                fontSize:"0.78rem", border:"1px solid #2e2255", fontWeight:500,
              }}>
                View on TCGPlayer →
              </a>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // ARTIST SECTION
    // ════════════════════════════════════════════════════════════
    function ArtistSection({ entry, cards, ownedKeys, onCardClick, searchQuery, sortBy }) {
      const isSecondary = entry.tier === "secondary";
      const [open, setOpen] = useState(!isSecondary);

      // Filter by search, then sort
      const displayCards = useMemo(function() {
        let arr = cards;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          arr = arr.filter(function(c) { return c.name.toLowerCase().indexOf(q) !== -1; });
        }
        return sortCards(arr, sortBy, ownedKeys);
      }, [cards, searchQuery, sortBy, ownedKeys]);

      const ownedCount = useMemo(function() {
        return cards.filter(function(c) {
          return ownedKeys.has(ownedKey(c.name, c.set && c.set.name || ""));
        }).length;
      }, [cards, ownedKeys]);

      const pct      = cards.length ? Math.round((ownedCount / cards.length) * 100) : 0;
      const complete = pct === 100 && cards.length > 0;

      useEffect(function() {
        if (searchQuery && displayCards.length > 0) setOpen(true);
      }, [searchQuery, displayCards.length]);

      if (searchQuery && displayCards.length === 0) return null;

      return (
        <div style={{ marginBottom:"2rem" }}>
          <div onClick={function() { setOpen(function(o) { return !o; }); }} style={{
            display:"flex", alignItems:"center", gap:"0.6rem",
            paddingBottom:"0.6rem", marginBottom:"0.75rem",
            borderBottom:"1px solid #1e1e35",
            cursor:"pointer", userSelect:"none",
          }}>
            <IcoChev open={open}/>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:"flex", alignItems:"baseline", flexWrap:"wrap", gap:"0.5rem" }}>
                <span style={{
                  fontSize: isSecondary ? "0.9rem" : "1.05rem",
                  fontWeight:700, letterSpacing:"-0.01em",
                  color: complete ? "#22c55e" : "#e8e8f4",
                }}>
                  {entry.tier === "special" ? "🎮 " : ""}{entry.name}{complete ? " ✓" : ""}
                </span>
                <span style={{ fontSize:"0.73rem", color:"#6b6b90", fontVariantNumeric:"tabular-nums" }}>
                  {ownedCount} / {cards.length}
                </span>
                {isSecondary && (
                  <span style={{ fontSize:"0.6rem", color:"#3a3a5a", background:"#141425", border:"1px solid #1e1e35", padding:"0px 5px", borderRadius:3 }}>
                    secondary
                  </span>
                )}
              </div>
              <div style={{ marginTop:"0.3rem", height:2, background:"#1e1e35", borderRadius:1, maxWidth:180, overflow:"hidden" }}>
                <div className="prog-fill" style={{
                  width:`${pct}%`, height:"100%", borderRadius:1,
                  background: complete ? "#22c55e" : "#8b6cd8",
                }}/>
              </div>
            </div>
          </div>

          {open && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(76px, 1fr))", gap:"6px" }}>
              {displayCards.map(function(card) {
                return (
                  <CardTile
                    key={card.id}
                    card={card}
                    owned={ownedKeys.has(ownedKey(card.name, card.set && card.set.name || ""))}
                    onClick={onCardClick}
                  />
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // SETTINGS
    // ════════════════════════════════════════════════════════════
    function SettingsPanel({ onClose, onClearCache }) {
      const [key, setKey] = useState(function() { return lsGet("pb2_api_key") || ""; });
      const save = function() { lsSet("pb2_api_key", key.trim()); onClose(); };

      useEffect(function() {
        const fn = function(e) { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", fn);
        return function() { window.removeEventListener("keydown", fn); };
      }, [onClose]);

      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, zIndex:300,
          background:"rgba(7,7,15,0.8)", backdropFilter:"blur(4px)",
          display:"flex", alignItems:"center", justifyContent:"center", padding:"1rem",
        }}>
          <div className="fade-up" onClick={function(e) { e.stopPropagation(); }} style={{
            background:"#141425", border:"1px solid #1e1e35", borderRadius:16,
            padding:"1.5rem", maxWidth:380, width:"100%",
          }}>
            <h3 style={{ fontWeight:700, fontSize:"1rem", color:"#e8e8f4", marginBottom:"1.25rem" }}>Settings</h3>

            <label style={{ display:"block", fontSize:"0.75rem", color:"#6b6b90", marginBottom:"0.4rem" }}>
              pokemontcg.io API Key <span style={{ color:"#3a3a5a" }}>(optional)</span>
            </label>
            <input
              type="password" value={key} onChange={function(e) { setKey(e.target.value); }}
              placeholder="Increases rate limits — leave blank for now"
              style={{
                width:"100%", background:"#0f0f1c", border:"1px solid #1e1e35",
                borderRadius:8, color:"#e8e8f4", padding:"0.5rem 0.75rem",
                fontSize:"0.85rem", marginBottom:"0.5rem",
              }}
            />
            <a href="https://dev.pokemontcg.io/" target="_blank" rel="noopener" style={{ display:"block", fontSize:"0.72rem", color:"#8b6cd8", marginBottom:"1.25rem" }}>
              Get a free API key (30 seconds) →
            </a>

            <div style={{ display:"flex", gap:"0.5rem", marginBottom:"1.5rem" }}>
              <button onClick={save} style={{ flex:1, background:"#8b6cd8", color:"white", border:"none", borderRadius:8, padding:"0.55rem", cursor:"pointer", fontWeight:600, fontSize:"0.875rem" }}>Save</button>
              <button onClick={onClose} style={{ flex:1, background:"#1e1e35", color:"#e8e8f4", border:"none", borderRadius:8, padding:"0.55rem", cursor:"pointer", fontSize:"0.875rem" }}>Cancel</button>
            </div>

            <div style={{ borderTop:"1px solid #1e1e35", paddingTop:"1rem" }}>
              <p style={{ fontSize:"0.72rem", color:"#4a4a70", marginBottom:"0.6rem" }}>
                Card data is cached locally for 24 hours. Clear cache to force a re-fetch.
              </p>
              <button
                onClick={function() {
                  if (window.confirm("Clear cached card data? The app will re-fetch everything on next load.")) {
                    onClearCache(); onClose();
                  }
                }}
                style={{ width:"100%", background:"#200f18", color:"#f87171", border:"1px solid #3d1525", borderRadius:8, padding:"0.5rem", cursor:"pointer", fontSize:"0.8rem" }}
              >
                Clear card cache
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    // APP
    // ════════════════════════════════════════════════════════════
    function App() {
      const [cardData,     setCardData]     = useState({});
      const [loadingSet,   setLoadingSet]   = useState(new Set());
      const [errors,       setErrors]       = useState({});
      const [ownedKeys,    setOwnedKeys]    = useState(new Set()); // "normName:::normSet" keys
      const [selectedCard, setSelectedCard] = useState(null);
      const [search,       setSearch]       = useState("");
      const [filterSlug,   setFilterSlug]   = useState("all");
      const [sortBy,       setSortBy]       = useState("name");
      const [showSettings, setShowSettings] = useState(false);
      const [csvStatus,    setCsvStatus]    = useState(null);
      const fileRef   = useRef(null);
      const searchRef = useRef(null);

      const getApiKey = function() { return lsGet("pb2_api_key") || ""; };

      useEffect(function() {
        const el = document.getElementById("splash");
        if (el) { el.style.opacity = "0"; setTimeout(function() { el.remove(); }, 350); }
      }, []);

      // Restore owned keys from storage (v2 format: name:::set)
      useEffect(function() {
        const saved = lsGet("pb2_owned_v2") || [];
        setOwnedKeys(new Set(saved));
      }, []);

      const loadEntry = useCallback(async function(entry) {
        const slug = toSlug(entry.name);
        setLoadingSet(function(s) { return new Set([].concat(Array.from(s), [slug])); });
        setErrors(function(e) { const n = Object.assign({}, e); delete n[slug]; return n; });
        try {
          const cards = await fetchArtistCards(entry, getApiKey());
          setCardData(function(d) { return Object.assign({}, d, { [slug]: cards }); });
        } catch(err) {
          setErrors(function(e) { return Object.assign({}, e, { [slug]: err.message }); });
        } finally {
          setLoadingSet(function(s) { const n = new Set(s); n.delete(slug); return n; });
        }
      }, []);

      useEffect(function() { ARTISTS.forEach(loadEntry); }, []);

      const handleCSV = useCallback(function(file) {
        setCsvStatus("loading");
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          complete: function(result) {
            const pokemon = result.data.filter(function(r) { return (r["Category"] || "").trim() === "Pokemon"; });
            // Build "normName:::normSet" keys so matching is per-artist, not just per-name.
            // This prevents a Suicune you own from marking every artist's Suicune as owned.
            const keys = new Set(
              pokemon.map(function(r) {
                return ownedKey(r["Product Name"] || "", r["Set"] || "");
              }).filter(function(k) { return k !== ":::"; })
            );
            setOwnedKeys(keys);
            lsSet("pb2_owned_v2", Array.from(keys));
            setCsvStatus({ count: pokemon.length });
            setTimeout(function() { setCsvStatus(null); }, 5000);
          },
          error: function() {
            setCsvStatus(null);
            alert("Could not read CSV. Make sure it's a Collectr export.");
          },
        });
      }, []);

      const onFileChange = function(e) {
        const f = e.target.files && e.target.files[0];
        if (f) handleCSV(f);
        e.target.value = "";
      };

      const clearCache = function() {
        ARTISTS.forEach(function(e) { lsDel(`pb2_cards_${toSlug(e.name)}`); });
        setCardData({});
        setErrors({});
        ARTISTS.forEach(loadEntry);
      };

      const visibleArtists = filterSlug === "all" ? ARTISTS : ARTISTS.filter(function(a) { return toSlug(a.name) === filterSlug; });

      const totalCards = useMemo(function() {
        return Object.values(cardData).reduce(function(s, a) { return s + a.length; }, 0);
      }, [cardData]);

      const totalOwned = useMemo(function() {
        return Object.values(cardData).reduce(function(s, cards) {
          return s + cards.filter(function(c) {
            return ownedKeys.has(ownedKey(c.name, c.set && c.set.name || ""));
          }).length;
        }, 0);
      }, [cardData, ownedKeys]);

      const totalPct = totalCards ? Math.round((totalOwned / totalCards) * 100) : 0;

      const searchHasResults = search
        ? visibleArtists.some(function(entry) {
            const cards = cardData[toSlug(entry.name)] || [];
            const q = search.toLowerCase();
            return cards.some(function(c) { return c.name.toLowerCase().indexOf(q) !== -1; });
          })
        : true;

      const selectStyle = {
        background:"#0f0f1c", border:"1px solid #1e1e35", borderRadius:8,
        color:"#e8e8f4", padding:"0.4rem 0.6rem", fontSize:"0.76rem",
      };

      return (
        <div style={{ minHeight:"100dvh", background:"#07070f" }}>

          <header style={{
            position:"sticky", top:0, zIndex:100,
            background:"rgba(7,7,15,0.97)",
            backdropFilter:"blur(18px)", WebkitBackdropFilter:"blur(18px)",
            borderBottom:"1px solid #1e1e35",
          }}>
            <div style={{ maxWidth:860, margin:"0 auto", padding:"0.7rem 1rem" }}>

              {/* Row 1: title + actions */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"0.6rem" }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:"0.6rem" }}>
                  <h1 style={{ fontSize:"1rem", fontWeight:800, color:"#e8e8f4", letterSpacing:"-0.02em" }}>
                    🎴 Artist Binder
                  </h1>
                  {totalCards > 0 && (
                    <span style={{ fontSize:"0.7rem", color:"#6b6b90", fontVariantNumeric:"tabular-nums" }}>
                      {totalOwned}/{totalCards} · {totalPct}%
                    </span>
                  )}
                </div>
                <div style={{ display:"flex", gap:"0.4rem", alignItems:"center" }}>
                  {csvStatus === "loading" && (
                    <span style={{ fontSize:"0.7rem", color:"#6b6b90", display:"flex", alignItems:"center", gap:4 }}>
                      <IcoSpin/> Reading…
                    </span>
                  )}
                  {csvStatus && csvStatus.count && (
                    <span style={{ fontSize:"0.7rem", color:"#22c55e" }}>✓ {csvStatus.count} Pokémon loaded</span>
                  )}
                  <button onClick={function() { fileRef.current && fileRef.current.click(); }} style={{
                    display:"flex", alignItems:"center", gap:"0.35rem",
                    background:"#1e1e35", color:"#8b6cd8", border:"1px solid #2a2a50",
                    borderRadius:8, padding:"0.38rem 0.65rem", cursor:"pointer",
                    fontSize:"0.75rem", fontWeight:600,
                  }}>
                    <IcoUpload/> Upload CSV
                  </button>
                  <button onClick={function() { setShowSettings(true); }} style={{
                    background:"#1e1e35", color:"#6b6b90", border:"1px solid #2a2a50",
                    borderRadius:8, padding:"0.38rem", cursor:"pointer", display:"flex",
                  }}>
                    <IcoGear/>
                  </button>
                  <input ref={fileRef} type="file" accept=".csv" onChange={onFileChange} style={{ display:"none" }}/>
                </div>
              </div>

              {/* Row 2: search + artist filter + sort */}
              <div style={{ display:"flex", gap:"0.5rem", flexWrap:"wrap" }}>
                <div style={{ flex:"1 1 160px", position:"relative", minWidth:0 }}>
                  <span style={{ position:"absolute", left:"0.6rem", top:"50%", transform:"translateY(-50%)", color:"#6b6b90", display:"flex", pointerEvents:"none" }}>
                    <IcoSearch/>
                  </span>
                  <input
                    ref={searchRef} type="search" placeholder="Search cards…" value={search}
                    onChange={function(e) { setSearch(e.target.value); }}
                    style={Object.assign({}, selectStyle, { width:"100%", padding:"0.4rem 2rem 0.4rem 2rem", fontSize:"0.85rem" })}
                  />
                  {search && (
                    <button onClick={function() { setSearch(""); searchRef.current && searchRef.current.focus(); }} style={{
                      position:"absolute", right:"0.4rem", top:"50%", transform:"translateY(-50%)",
                      background:"none", border:"none", color:"#6b6b90", cursor:"pointer", display:"flex",
                    }}>
                      <IcoX/>
                    </button>
                  )}
                </div>

                <select value={filterSlug} onChange={function(e) { setFilterSlug(e.target.value); }} style={Object.assign({}, selectStyle, { maxWidth:148 })}>
                  <option value="all">All Artists</option>
                  <optgroup label="Main">
                    {ARTISTS.filter(function(a) { return a.tier==="main"; }).map(function(a) {
                      return <option key={a.name} value={toSlug(a.name)}>{a.name}</option>;
                    })}
                  </optgroup>
                  <optgroup label="Secondary">
                    {ARTISTS.filter(function(a) { return a.tier==="secondary"; }).map(function(a) {
                      return <option key={a.name} value={toSlug(a.name)}>{a.name}</option>;
                    })}
                  </optgroup>
                  <optgroup label="Special">
                    {ARTISTS.filter(function(a) { return a.tier==="special"; }).map(function(a) {
                      return <option key={a.name} value={toSlug(a.name)}>{a.name}</option>;
                    })}
                  </optgroup>
                </select>

                <select value={sortBy} onChange={function(e) { setSortBy(e.target.value); }} style={Object.assign({}, selectStyle, { maxWidth:148 })}>
                  <option value="name">Name A–Z</option>
                  <option value="missing">Missing first</option>
                  <option value="owned">Owned first</option>
                  <option value="price-desc">Price: High → Low</option>
                  <option value="price-asc">Price: Low → High</option>
                  <option value="date-desc">Newest first</option>
                  <option value="date-asc">Oldest first</option>
                </select>
              </div>
            </div>
          </header>

          <main style={{ maxWidth:860, margin:"0 auto", padding:"1rem" }}>

            {totalCards > 0 && (
              <div style={{ height:2, background:"#1e1e35", borderRadius:1, overflow:"hidden", marginBottom:"1.5rem" }}>
                <div className="prog-fill" style={{ width:`${totalPct}%`, height:"100%", background:"#8b6cd8", borderRadius:1 }}/>
              </div>
            )}

            {visibleArtists.map(function(entry) {
              const slug      = toSlug(entry.name);
              const cards     = cardData[slug] || [];
              const isLoading = loadingSet.has(slug);
              const err       = errors[slug];

              if (isLoading && !cards.length) {
                return (
                  <div key={entry.name} style={{ display:"flex", alignItems:"center", gap:"0.5rem", padding:"0.6rem 0", color:"#6b6b90", fontSize:"0.8rem" }}>
                    <IcoSpin/> Loading {entry.name}…
                  </div>
                );
              }
              if (err) {
                return (
                  <div key={entry.name} style={{ padding:"0.6rem 0", fontSize:"0.78rem", color:"#f87171", display:"flex", alignItems:"center", gap:"0.5rem" }}>
                    <span>⚠ {entry.name}: {err}</span>
                    <button onClick={function() { loadEntry(entry); }} style={{ color:"#8b6cd8", background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:3, fontSize:"0.75rem" }}>
                      <IcoRetry/> retry
                    </button>
                  </div>
                );
              }
              if (!cards.length) return null;

              return (
                <ArtistSection
                  key={entry.name}
                  entry={entry}
                  cards={cards}
                  ownedKeys={ownedKeys}
                  onCardClick={setSelectedCard}
                  searchQuery={search}
                  sortBy={sortBy}
                />
              );
            })}

            {search && !searchHasResults && (
              <div style={{ textAlign:"center", padding:"3rem 1rem", color:"#6b6b90", fontSize:"0.875rem" }}>
                No cards matching "{search}"
              </div>
            )}

            <div style={{ marginTop:"3rem", paddingTop:"1rem", borderTop:"1px solid #1e1e35", fontSize:"0.68rem", color:"#3a3a5a", textAlign:"center" }}>
              Card data from pokemontcg.io · Prices via TCGPlayer · Cached 24h locally
            </div>
          </main>

          {selectedCard && (
            <CardModal
              card={selectedCard}
              owned={ownedKeys.has(ownedKey(selectedCard.name, selectedCard.set && selectedCard.set.name || ""))}
              onClose={function() { setSelectedCard(null); }}
            />
          )}
          {showSettings && (
            <SettingsPanel onClose={function() { setShowSettings(false); }} onClearCache={clearCache}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
