    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{min-height:100%;}

    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#07070f;} ::-webkit-scrollbar-thumb{background:#2a2a45;border-radius:3px;}

    .card-tile{position:relative;cursor:pointer;border-radius:6px;overflow:hidden;}
    .card-tile img{display:block;width:100%;height:auto;border-radius:6px;transition:transform .15s ease,filter .15s ease;}
    .card-tile.missing img{filter:grayscale(1) brightness(0.3);}
    .card-tile.owned   img{filter:none;}
    .card-tile:hover   img{transform:translateY(-2px) scale(1.03);}
    .card-tile.missing:hover img{filter:grayscale(0.5) brightness(0.5);}
    .card-blank{width:100%;padding-bottom:139.7%;background:#141425;border-radius:6px;position:relative;border:1px solid #1e1e35;}
    .card-blank span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:5px;font-size:.58rem;color:#4a4a70;text-align:center;line-height:1.3;}

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes flameFlicker{0%,100%{transform:scaleX(1) scaleY(1) skewX(0deg);}15%{transform:scaleX(.93) scaleY(1.07) skewX(2deg);}30%{transform:scaleX(1.06) scaleY(.96) skewX(-1deg);}50%{transform:scaleX(.97) scaleY(1.05) skewX(1.5deg);}70%{transform:scaleX(1.04) scaleY(.98) skewX(-2deg);}85%{transform:scaleX(.95) scaleY(1.03) skewX(1deg);}}
    @keyframes flameFlicker2{0%,100%{transform:scaleX(1) scaleY(1);}25%{transform:scaleX(1.08) scaleY(.94);}50%{transform:scaleX(.92) scaleY(1.08);}75%{transform:scaleX(1.05) scaleY(.97);}}
    @keyframes emberRise{0%{transform:translateY(0) scale(1);opacity:.9;}80%{opacity:.4;}100%{transform:translateY(-280px) scale(.1);opacity:0;}}
    @keyframes glowPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
    @keyframes landingExit{from{opacity:1;transform:scale(1);}to{opacity:0;transform:scale(1.04);}}
    @keyframes syncPop{0%{transform:scale(1);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
    .spinner{animation:spin .8s linear infinite;}
    .fade-up{animation:fadeUp .2s ease forwards;}
    .fade-in{animation:fadeIn .4s ease forwards;}
    .prog-fill{transition:width .7s ease;}
    .modal-bg{backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
    .landing-exit{animation:landingExit .45s ease forwards;}

<script type="text/babel">
/** @jsxRuntime classic */
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPA_URL = "https://hbpjbefohkcnovlwvqhc.supabase.co";

// ── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE  = "https://api.pokemontcg.io/v2";

  {name:"Shibuzoh",        tier:"main",      isSet:false},
  {name:"Yukiko Baba",     tier:"main",      isSet:false},
  {name:"sui",             tier:"main",      isSet:false},
  {name:"akira egawa",     tier:"secondary", isSet:false},

// ── LOCAL STORAGE (card cache + api key only — user data lives in Supabase) ──
const lsGet = k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet = (k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsDel = k=>{try{localStorage.removeItem(k);}catch{}};

// ── HELPERS ──────────────────────────────────────────────────────────────────
const toSlug   = s=>s.toLowerCase().replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
const normName = s=>(s||"").toLowerCase().trim().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ");
const normNum  = n=>(n||"").toLowerCase().trim().replace(/\/.*$/,"").trim();
const normSet  = s=>(s||"").toLowerCase().replace(/&/g,"and").replace(/[—–]/g," ").replace(/[^a-z0-9\s]/g,"").replace(/\bpromos?\b/g,"promo").replace(/\s+/g," ").trim();
const fmt$     = n=>(n!=null&&!isNaN(n))?`$${Number(n).toFixed(2)}`:"—";
const todayStr = ()=>new Date().toISOString().slice(0,10);

const makeKeys=(cardName,cardNumber,setName)=>{
  const n=normName(cardName);if(!n)return[];
  const keys=[];
  const num=normNum(cardNumber);if(num)keys.push(n+"::num::"+num);
  const s=normSet(setName);if(s)keys.push(n+"::set::"+s);
  return keys;
};

const isCardOwned=(card,ownedKeySet,manualOwned,manualMissing)=>{
  if(manualMissing.has(card.id))return false;
  if(manualOwned.has(card.id))return true;
  return makeKeys(card.name||"",card.number||"",card.set&&card.set.name||"").some(k=>ownedKeySet.has(k));
};

const getBestPrice=card=>{
  const p=card&&card.tcgplayer&&card.tcgplayer.prices?card.tcgplayer.prices:{};
  for(const k of["holofoil","1stEditionHolofoil","unlimitedHolofoil","reverseHolofoil","normal","unlimited"])
    if(p[k]&&p[k].market!=null)return{amount:p[k].market,variant:k,prices:p[k]};
  const first=Object.keys(p)[0];
  if(first&&p[first]&&p[first].market!=null)return{amount:p[first].market,variant:first,prices:p[first]};
  return null;
};

const sortCards=(arr,sortBy,checkOwned)=>{
  if(!arr||!arr.length)return arr;
  const a2=arr.slice();
  const priceOf=c=>{const p=getBestPrice(c);return p?p.amount:null;};
  const byName=(a,b)=>(a.name||"").localeCompare(b.name||"");
  const byDate=(a,b)=>{const da=a.set&&a.set.releaseDate||"",db=b.set&&b.set.releaseDate||"";return da===db?byName(a,b):da.localeCompare(db);};
  switch(sortBy){
    case"price-desc":return a2.sort((a,b)=>{const pa=priceOf(a),pb=priceOf(b);if(pa===null&&pb===null)return byName(a,b);if(pa===null)return 1;if(pb===null)return-1;return pb-pa||byName(a,b);});
    case"price-asc": return a2.sort((a,b)=>{const pa=priceOf(a),pb=priceOf(b);if(pa===null&&pb===null)return byName(a,b);if(pa===null)return 1;if(pb===null)return-1;return pa-pb||byName(a,b);});
    case"missing":   return a2.sort((a,b)=>{const ao=checkOwned(a),bo=checkOwned(b);return ao!==bo?(ao?1:-1):byName(a,b);});
    case"owned":     return a2.sort((a,b)=>{const ao=checkOwned(a),bo=checkOwned(b);return ao!==bo?(ao?-1:1):byName(a,b);});
    case"date-desc": return a2.sort((a,b)=>byDate(b,a));
    case"date-asc":  return a2.sort(byDate);
    default:         return a2;
  }
};

// ── API (card data — still cached in localStorage, not user-specific) ─────────
async function apiFetch(q,apiKey){
  let all=[],page=1;
  const headers=apiKey?{"X-Api-Key":apiKey}:{};
  while(true){
    const res=await fetch(`${API_BASE}/cards?q=${encodeURIComponent(q)}&pageSize=250&page=${page}&orderBy=name`,{headers});
    if(!res.ok)throw new Error(`API error ${res.status}`);
    const json=await res.json();
    const data=json.data||[],total=json.totalCount||0;
    all=all.concat(data);
    if(all.length>=total||!data.length)break;
    page++;
  }
  return all;
}
async function fetchArtistCards(entry,apiKey){
  const ck=`pb2_cards_${toSlug(entry.name)}`;
  const cached=lsGet(ck);
  if(cached&&cached.ts&&Date.now()-cached.ts<CACHE_TTL)return cached.cards;
  const q=entry.isSet?entry.query:`artist:"${entry.name}"`;
  const cards=await apiFetch(q,apiKey);
  lsSet(ck,{cards,ts:Date.now()});
  return cards;
}

// ── SUPABASE DATA HELPERS ─────────────────────────────────────────────────────
async function loadUserData(userId){
  const[colRes,ovRes,phRes]=await Promise.all([
    sb.from("user_collection").select("owned_keys").eq("user_id",userId).maybeSingle(),
    sb.from("card_overrides").select("card_id,override_type").eq("user_id",userId),
    sb.from("price_history").select("card_id,price,recorded_date").eq("user_id",userId).order("recorded_date"),
  ]);
  const ownedKeys=new Set(colRes.data?.owned_keys??[]);
  const manualOwned=new Set(),manualMissing=new Set();
  (ovRes.data??[]).forEach(r=>{r.override_type==="owned"?manualOwned.add(r.card_id):manualMissing.add(r.card_id);});
  const priceHistory={};
  (phRes.data??[]).forEach(r=>{
    if(!priceHistory[r.card_id])priceHistory[r.card_id]=[];
    priceHistory[r.card_id].push({date:r.recorded_date,price:Number(r.price)});
  });
  return{ownedKeys,manualOwned,manualMissing,priceHistory};
}

async function saveCollection(userId,ownedKeys){
  return sb.from("user_collection").upsert({user_id:userId,owned_keys:Array.from(ownedKeys),updated_at:new Date().toISOString()},{onConflict:"user_id"});
}

async function saveOverride(userId,cardId,action){
  if(action==="reset")return sb.from("card_overrides").delete().eq("user_id",userId).eq("card_id",cardId);
  return sb.from("card_overrides").upsert({user_id:userId,card_id:cardId,override_type:action},{onConflict:"user_id,card_id"});
}

async function savePricePoint(userId,cardId,price,date){
  return sb.from("price_history").upsert({user_id:userId,card_id:cardId,price,recorded_date:date},{onConflict:"user_id,card_id,recorded_date"});
}

// ── FLAME BACKGROUND (shared by landing + loading screens) ───────────────────
const FLAME_DEFS=[
  {left:"8%", w:70, h:260,blur:14,delay:0,  dur:2.1,anim:"flameFlicker"},
  {left:"18%",w:45, h:180,blur:10,delay:.4, dur:1.7,anim:"flameFlicker2"},

  {left:"42%",w:55, h:220,blur:12,delay:.7, dur:1.9,anim:"flameFlicker2"},

  {left:"90%",w:50, h:170,blur:9, delay:.65,dur:1.6,anim:"flameFlicker2"},

const EMBER_DEFS=Array.from({length:22},(_,i)=>({left:(5+i*4.2+Math.sin(i*1.3)*8)%95+"%",size:3+(i%4),delay:(i*.37)%4,dur:2.2+(i%3)*.8}));

function FlameBackground({dim}){
  return(
    <>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"65%",overflow:"hidden",opacity:dim?.5:1}}>
        {FLAME_DEFS.map((f,i)=>(
          <div key={i} style={{position:"absolute",bottom:0,left:f.left,marginLeft:-f.w/2,width:f.w,height:f.h,

}

// ── LANDING / AUTH PAGE ───────────────────────────────────────────────────────
function LandingPage({user,onEnter,onSendLink,onSignOut}){
  const[email,setEmail]=useState("");
  const[linkSent,setLinkSent]=useState(false);
  const[sending,setSending]=useState(false);
  const[error,setError]=useState("");
  const[exiting,setExiting]=useState(false);
  const emailRef=useRef(null);
  const isLoggedIn=!!user;

  const enter=()=>{setExiting(true);setTimeout(onEnter,420);};

  useEffect(()=>{
    const fn=e=>{if(e.key==="Enter"&&isLoggedIn)enter();};
    window.addEventListener("keydown",fn);return()=>window.removeEventListener("keydown",fn);
  },[isLoggedIn]);

  const send=async()=>{
    if(!email.trim())return;
    setSending(true);setError("");
    try{await onSendLink(email.trim());setLinkSent(true);}
    catch(err){setError(err.message||"Failed to send. Try again.");}
    finally{setSending(false);}

  const cardStyle={

  return(
    <div className={exiting?"landing-exit":""} onClick={isLoggedIn?enter:undefined}
      style={{position:"fixed",inset:0,zIndex:9999,cursor:isLoggedIn?"pointer":"default",
        background:"radial-gradient(ellipse at 50% 110%,#3d0f00 0%,#1a0500 40%,#080200 70%,#030100 100%)",
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>

      <FlameBackground/>

      <div className="fade-in" style={{position:"relative",zIndex:10,textAlign:"center",padding:"1rem",width:"100%",maxWidth:400}}>
        <div style={{fontSize:"3.5rem",marginBottom:".75rem",filter:"drop-shadow(0 0 20px rgba(255,150,0,0.8))"}}>🎴</div>
        <h1 style={{fontSize:"clamp(2.2rem,9vw,4rem)",fontWeight:900,letterSpacing:"-.03em",color:"#fff8f0",lineHeight:1,
          textShadow:"0 0 60px rgba(255,100,0,0.9),0 0 20px rgba(255,200,0,0.5)",marginBottom:".5rem"}}>
          Artist Binder
        </h1>

        {isLoggedIn?(
          <>
            <p style={{fontSize:"clamp(.85rem,2.5vw,1rem)",color:"#ff9944",marginBottom:"2rem",letterSpacing:".02em",textShadow:"0 0 12px rgba(255,120,0,0.6)"}}>
              Your collection. Your fire. 🔥
            </p>
            <button onClick={e=>{e.stopPropagation();enter();}} style={{
              background:"linear-gradient(135deg,#ff5500,#ff2200)",color:"#fff8f0",border:"none",borderRadius:50,
              padding:".9rem 3rem",fontSize:"1rem",fontWeight:800,cursor:"pointer",letterSpacing:".1em",
              boxShadow:"0 0 40px rgba(255,60,0,0.6),0 0 80px rgba(255,60,0,0.3)",

              <button onClick={e=>{e.stopPropagation();onSignOut();}} style={{fontSize:".7rem",color:"#ff6633",background:"none",border:"1px solid rgba(255,100,50,0.2)",borderRadius:6,padding:"2px 8px",cursor:"pointer"}}>

              </button>
            </div>
            <p style={{marginTop:"1.5rem",fontSize:".6rem",color:"#5a2200",letterSpacing:".08em"}}>⚡ A TRIBUTE TO BLAZIKEN — THE GREATEST ⚡</p>

        ):linkSent?(
          <div onClick={e=>e.stopPropagation()} style={cardStyle}>
            <div style={{fontSize:"2rem",marginBottom:".75rem"}}>📬</div>
            <h2 style={{fontSize:"1.1rem",fontWeight:700,color:"#fff8f0",marginBottom:".5rem"}}>Check your email!</h2>

// ── PRICE SPARKLINE ────────────────────────────────────────────────────────────
function PriceChart({history}){
  const hist=(history||[]).slice(-90);
  if(hist.length<2)return <div style={{textAlign:"center",color:"#6b6b90",fontSize:".75rem",padding:"1.25rem 0",lineHeight:1.6}}>Price history builds over time as you open cards.<br/>{hist.length===1?"1 point recorded — check back tomorrow!":"No history yet."}</div>;
  const prices=hist.map(h=>h.price),dates=hist.map(h=>h.date.slice(5));
  const minP=Math.min(...prices),maxP=Math.max(...prices),range=maxP-minP||1;
  const W=340,H=80,PX=8,PY=12,W2=W-2*PX,H2=H-2*PY;
  const pts=prices.map((p,i)=>[PX+(prices.length>1?(i/(prices.length-1))*W2:W2/2),PY+H2-((p-minP)/range)*H2]);
  const poly=pts.map(pt=>pt[0]+","+pt[1]).join(" ");
  const last=pts[pts.length-1],first=pts[0];
  const areaD=["M "+first[0]+","+(H-PY),...pts.map(pt=>"L "+pt[0]+","+pt[1]),"L "+last[0]+","+(H-PY),"Z"].join(" ");
  const gid="g"+hist[0].date.replace(/\D/g,"");
  return(
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:"auto",display:"block"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#8b6cd8" stopOpacity="0.25"/><stop offset="100%" stopColor="#8b6cd8" stopOpacity="0.02"/></linearGradient></defs>
      <line x1={PX} y1={PY} x2={W-PX} y2={PY} stroke="#1e1e35" strokeWidth="1"/>
      <line x1={PX} y1={PY+H2/2} x2={W-PX} y2={PY+H2/2} stroke="#1e1e35" strokeWidth="1"/>
      <line x1={PX} y1={H-PY} x2={W-PX} y2={H-PY} stroke="#1e1e35" strokeWidth="1"/>
      <path d={areaD} fill={"url(#"+gid+")"}/>
      <polyline points={poly} fill="none" stroke="#8b6cd8" strokeWidth="2" strokeLinejoin="round"/>
      <circle cx={last[0]} cy={last[1]} r="3" fill="#8b6cd8"/>
      <text x={W-PX} y={PY-2} textAnchor="end" fontSize="8" fill="#6b6b90">{fmt$(maxP)}</text>
      <text x={W-PX} y={H-1} textAnchor="end" fontSize="8" fill="#6b6b90">{fmt$(minP)}</text>
      <text x={PX} y={H-1} fontSize="8" fill="#6b6b90">{dates[0]}</text>
      <text x={W/2} y={H-1} textAnchor="middle" fontSize="8" fill="#6b6b90">{dates[Math.floor(dates.length/2)]}</text>
    </svg>
  );
}

    return sortCards(arr,sortBy,checkOwned);
  },[cards,searchQuery,sortBy,checkOwned]);
  const ownedCount=useMemo(()=>cards.filter(checkOwned).length,[cards,checkOwned]);
  const pct=cards.length?Math.round((ownedCount/cards.length)*100):0;
  const complete=pct===100&&cards.length>0;
  useEffect(()=>{if(searchQuery&&displayCards.length>0)setOpen(true);},[searchQuery,displayCards.length]);

function App(){
  const[view,         setView]         =useState("checking-auth");
  const[user,         setUser]         =useState(null);
  const[cardData,     setCardData]     =useState({});
  const[loadingSet,   setLoadingSet]   =useState(new Set());
  const[errors,       setErrors]       =useState({});
  const[ownedKeySet,  setOwnedKeySet]  =useState(new Set());
  const[manualOwned,  setManualOwned]  =useState(new Set());
  const[manualMissing,setManualMissing]=useState(new Set());
  const[priceHistory, setPriceHistory] =useState({});
  const[selectedCard, setSelectedCard] =useState(null);
  const[search,       setSearch]       =useState("");
  const[filterSlug,   setFilterSlug]   =useState("all");
  const[sortBy,       setSortBy]       =useState("name");
  const[showSettings, setShowSettings] =useState(false);
  const[csvStatus,    setCsvStatus]    =useState(null);
  const[syncStatus,   setSyncStatus]   =useState("idle"); // idle|syncing|synced|error
  const fileRef=useRef(null),searchRef=useRef(null);

  const getApiKey=()=>lsGet("pb2_api_key")||"";

  // Sync status helper
  const withSync=async(fn)=>{
    setSyncStatus("syncing");
    try{await fn();setSyncStatus("synced");setTimeout(()=>setSyncStatus("idle"),2000);}
    catch(e){console.error(e);setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);}
  };

  // Load all user data from Supabase
  const loadData=useCallback(async(uid)=>{
    setView("loading-data");
    try{
      const{ownedKeys,manualOwned:mo,manualMissing:mm,priceHistory:ph}=await loadUserData(uid);
      setOwnedKeySet(ownedKeys);setManualOwned(mo);setManualMissing(mm);setPriceHistory(ph);
    }catch(e){console.error("Load error:",e);}
    setView("landing");
  },[]);

  // Auth: check session on mount and listen for changes
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else setView("landing");
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if((event==="SIGNED_IN"||event==="TOKEN_REFRESHED")&&session?.user){
        setUser(session.user);
        if(view==="landing"||view==="checking-auth")loadData(session.user.id);
      }else if(event==="SIGNED_OUT"){
        setUser(null);setOwnedKeySet(new Set());setManualOwned(new Set());setManualMissing(new Set());setPriceHistory({});setView("landing");
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  const handleSendLink=async(email)=>{
    const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:REDIRECT}});
    if(error)throw error;
  };
  const handleSignOut=()=>sb.auth.signOut();

  // Card data loading
  const loadEntry=useCallback(async entry=>{
    const slug=toSlug(entry.name);
    setLoadingSet(s=>new Set([...s,slug]));
    setErrors(e=>{const n={...e};delete n[slug];return n;});
    try{const cards=await fetchArtistCards(entry,getApiKey());setCardData(d=>({...d,[slug]:cards}));}
    catch(err){setErrors(e=>({...e,[slug]:err.message}));}
    finally{setLoadingSet(s=>{const n=new Set(s);n.delete(slug);return n;});}
  },[]);
  useEffect(()=>{ARTISTS.forEach(loadEntry);},[]);

  // CSV upload
  const handleCSV=useCallback(file=>{
    setCsvStatus("loading");
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:async({data})=>{
      const pokemon=data.filter(r=>(r["Category"]||"").trim()==="Pokemon");
      const keys=new Set();
      pokemon.forEach(r=>makeKeys(r["Product Name"]||"",r["Card Number"]||"",r["Set"]||"").forEach(k=>keys.add(k)));
      setOwnedKeySet(keys);
      setCsvStatus({count:pokemon.length});
      setTimeout(()=>setCsvStatus(null),5000);
      if(user)withSync(()=>saveCollection(user.id,keys));
    },error:()=>{setCsvStatus(null);alert("Could not read CSV.");}});
  },[user]);

  // Manual overrides
  const handleToggleManual=useCallback((cardId,action)=>{
    setManualOwned(prev=>{
      const n=new Set(prev);
      if(action==="owned")n.has(cardId)?n.delete(cardId):n.add(cardId);
      else if(action==="reset")n.delete(cardId);
      if(user)withSync(()=>saveOverride(user.id,cardId,action==="owned"?(n.has(cardId)?"owned":"reset"):"reset"));
      return n;
    });
    setManualMissing(prev=>{
      const n=new Set(prev);
      if(action==="missing")n.has(cardId)?n.delete(cardId):n.add(cardId);
      else if(action==="reset")n.delete(cardId);
      if(user&&action==="missing")withSync(()=>saveOverride(user.id,cardId,n.has(cardId)?"missing":"reset"));
      return n;
    });
  },[user]);

  // Price recording
  const handleRecordPrice=useCallback((cardId,price,date)=>{
    setPriceHistory(prev=>{
      const n={...prev};
      if(!n[cardId])n[cardId]=[];
      if(!n[cardId].find(h=>h.date===date)){
        n[cardId]=[...n[cardId],{date,price}].slice(-180);
        if(user)savePricePoint(user.id,cardId,price,date).catch(console.error);
      }
      return n;
    });
  },[user]);

  const clearCache=()=>{ARTISTS.forEach(e=>lsDel(`pb2_cards_${toSlug(e.name)}`));setCardData({});setErrors({});ARTISTS.forEach(loadEntry);};
  const clearManual=async()=>{
    setManualOwned(new Set());setManualMissing(new Set());
    if(user)withSync(async()=>{await sb.from("card_overrides").delete().eq("user_id",user.id);});
  };

  const checkOwned=useCallback(card=>isCardOwned(card,ownedKeySet,manualOwned,manualMissing),[ownedKeySet,manualOwned,manualMissing]);
  const visibleArtists=filterSlug==="all"?ARTISTS:ARTISTS.filter(a=>toSlug(a.name)===filterSlug);
  const totalCards=useMemo(()=>Object.values(cardData).reduce((s,a)=>s+a.length,0),[cardData]);
  const totalOwned=useMemo(()=>Object.values(cardData).reduce((s,cards)=>s+cards.filter(checkOwned).length,0),[cardData,checkOwned]);
  const totalPct=totalCards?Math.round((totalOwned/totalCards)*100):0;
  const manualCount=manualOwned.size+manualMissing.size;

  // ── Render non-binder views ──
  if(view==="checking-auth")return(
    <div style={{position:"fixed",inset:0,background:"#030100",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <IcoSpin/>
    </div>
  );

  if(view==="loading-data")return(
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 50% 110%,#3d0f00 0%,#1a0500 40%,#030100 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"1rem",overflow:"hidden"}}>
      <FlameBackground dim/>
      <div style={{position:"relative",zIndex:10,textAlign:"center"}}>
        <div style={{fontSize:"2rem",marginBottom:".5rem"}}>🎴</div>
        <IcoSpin/>
        <p style={{color:"#ff9944",fontSize:".9rem",marginTop:".75rem"}}>Loading your collection…</p>
      </div>
    </div>
  );

  if(view==="landing")return(
    <LandingPage user={user} onEnter={()=>setView("binder")} onSendLink={handleSendLink} onSignOut={handleSignOut}/>
  );

  // ── Binder view ──
  const selSt={background:"#0f0f1c",border:"1px solid #1e1e35",borderRadius:8,color:"#e8e8f4",padding:".4rem .6rem",fontSize:".76rem"};
  const syncIcon=syncStatus==="syncing"?<IcoSpin/>:syncStatus==="synced"?<span style={{color:"#22c55e",fontSize:".65rem"}}>✓ Synced</span>:syncStatus==="error"?<span style={{color:"#f87171",fontSize:".65rem"}}>Sync failed</span>:null;

  return(
    <div style={{minHeight:"100dvh",background:"#07070f"}}>
      <header style={{position:"sticky",top:0,zIndex:100,background:"rgba(7,7,15,0.97)",backdropFilter:"blur(18px)",WebkitBackdropFilter:"blur(18px)",borderBottom:"1px solid #1e1e35"}}>
        <div style={{maxWidth:860,margin:"0 auto",padding:".7rem 1rem"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:".6rem"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:".6rem"}}>
              <h1 style={{fontSize:"1rem",fontWeight:800,color:"#e8e8f4",letterSpacing:"-.02em",cursor:"pointer"}} onClick={()=>setView("landing")}>🎴 Artist Binder</h1>
              {totalCards>0&&<span style={{fontSize:".7rem",color:"#6b6b90",fontVariantNumeric:"tabular-nums"}}>{totalOwned}/{totalCards} · {totalPct}%</span>}
              {manualCount>0&&<span style={{fontSize:".62rem",color:"#60a5fa",background:"rgba(96,165,250,0.1)",padding:"1px 6px",borderRadius:4}}>{manualCount} manual</span>}
              {syncIcon&&<span style={{display:"flex",alignItems:"center",gap:3}}>{syncIcon}</span>}
            </div>
            <div style={{display:"flex",gap:".4rem",alignItems:"center"}}>
              {csvStatus==="loading"&&<span style={{fontSize:".7rem",color:"#6b6b90",display:"flex",alignItems:"center",gap:4}}><IcoSpin/> Reading…</span>}
              {csvStatus?.count&&<span style={{fontSize:".7rem",color:"#22c55e"}}>✓ {csvStatus.count} Pokémon</span>}
              <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{display:"flex",alignItems:"center",gap:".35rem",background:"#1e1e35",color:"#8b6cd8",border:"1px solid #2a2a50",borderRadius:8,padding:".38rem .65rem",cursor:"pointer",fontSize:".75rem",fontWeight:600}}>
                <IcoUpload/> Upload CSV
              </button>
              <button onClick={()=>setShowSettings(true)} style={{background:"#1e1e35",color:"#6b6b90",border:"1px solid #2a2a50",borderRadius:8,padding:".38rem",cursor:"pointer",display:"flex"}}><IcoGear/></button>
              <input ref={fileRef} type="file" accept=".csv" onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)handleCSV(f);e.target.value="";}} style={{display:"none"}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:".5rem",flexWrap:"wrap"}}>
            <div style={{flex:"1 1 160px",position:"relative",minWidth:0}}>
              <span style={{position:"absolute",left:".6rem",top:"50%",transform:"translateY(-50%)",color:"#6b6b90",display:"flex",pointerEvents:"none"}}><IcoSearch/></span>
              <input ref={searchRef} type="search" placeholder="Search cards…" value={search} onChange={e=>setSearch(e.target.value)} style={{...selSt,width:"100%",padding:".4rem 2rem .4rem 2rem",fontSize:".85rem"}}/>
              {search&&<button onClick={()=>{setSearch("");searchRef.current&&searchRef.current.focus();}} style={{position:"absolute",right:".4rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#6b6b90",cursor:"pointer",display:"flex"}}><IcoX/></button>}
            </div>
            <select value={filterSlug} onChange={e=>setFilterSlug(e.target.value)} style={{...selSt,maxWidth:148}}>
              <option value="all">All Artists</option>
              <optgroup label="Main">{ARTISTS.filter(a=>a.tier==="main").map(a=><option key={a.name} value={toSlug(a.name)}>{a.name}</option>)}</optgroup>
              <optgroup label="Secondary">{ARTISTS.filter(a=>a.tier==="secondary").map(a=><option key={a.name} value={toSlug(a.name)}>{a.name}</option>)}</optgroup>
              <optgroup label="Special">{ARTISTS.filter(a=>a.tier==="special").map(a=><option key={a.name} value={toSlug(a.name)}>{a.name}</option>)}</optgroup>
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{...selSt,maxWidth:148}}>
              <option value="name">Name A–Z</option>
              <option value="missing">Missing first</option>
              <option value="owned">Owned first</option>
              <option value="price-desc">Price: High → Low</option>
              <option value="price-asc">Price: Low → High</option>
              <option value="date-desc">Newest first</option>
              <option value="date-asc">Oldest first</option>
            </select>
          </div>
        </div>
      </header>

      <main style={{maxWidth:860,margin:"0 auto",padding:"1rem"}}>
        {totalCards>0&&<div style={{height:2,background:"#1e1e35",borderRadius:1,overflow:"hidden",marginBottom:"1.5rem"}}><div className="prog-fill" style={{width:`${totalPct}%`,height:"100%",background:"#8b6cd8",borderRadius:1}}/></div>}

        {visibleArtists.map(entry=>{
          const slug=toSlug(entry.name),cards=cardData[slug]||[];
          const isLoading=loadingSet.has(slug),err=errors[slug];
          if(isLoading&&!cards.length)return<div key={entry.name} style={{display:"flex",alignItems:"center",gap:".5rem",padding:".6rem 0",color:"#6b6b90",fontSize:".8rem"}}><IcoSpin/> Loading {entry.name}…</div>;
          if(err)return<div key={entry.name} style={{padding:".6rem 0",fontSize:".78rem",color:"#f87171",display:"flex",alignItems:"center",gap:".5rem"}}><span>⚠ {entry.name}: {err}</span><button onClick={()=>loadEntry(entry)} style={{color:"#8b6cd8",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontSize:".75rem"}}><IcoRetry/> retry</button></div>;
          if(!cards.length)return null;
          return<ArtistSection key={entry.name} entry={entry} cards={cards} checkOwned={checkOwned} manualOwned={manualOwned} manualMissing={manualMissing} onCardClick={setSelectedCard} searchQuery={search} sortBy={sortBy}/>;
        })}

        {search&&!visibleArtists.some(entry=>{const cards=cardData[toSlug(entry.name)]||[];const q=search.toLowerCase();return cards.some(c=>c.name.toLowerCase().includes(q));})&&(
          <div style={{textAlign:"center",padding:"3rem 1rem",color:"#6b6b90",fontSize:".875rem"}}>No cards matching "{search}"</div>
        )}
        <div style={{marginTop:"3rem",paddingTop:"1rem",borderTop:"1px solid #1e1e35",fontSize:".68rem",color:"#3a3a5a",textAlign:"center"}}>
          Card data from pokemontcg.io · Prices via TCGPlayer · {user?`Synced to ${user.email}`:"Local only"}
        </div>
      </main>

      {selectedCard&&<CardModal card={selectedCard} owned={checkOwned(selectedCard)} manualOwned={manualOwned} manualMissing={manualMissing} priceHistory={priceHistory} onToggleManual={handleToggleManual} onRecordPrice={handleRecordPrice} onClose={()=>setSelectedCard(null)}/>}
      {showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)} onClearCache={clearCache} onClearManual={clearManual} onSignOut={()=>{handleSignOut();setShowSettings(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
